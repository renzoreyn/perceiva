<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="rg" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#a0b8f0"/>
      <stop offset="45%" stop-color="#6c90d8"/>
      <stop offset="100%" stop-color="#7b5fd4"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <circle cx="16" cy="16" r="16" fill="url(#rg)"/>
  <circle cx="16" cy="16" r="16" fill="url(#rg)" filter="url(#grain)" opacity="0.35"/>
</svg>
